<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin-top: 50px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

#popupContenido {
  background: white;
  padding: 25px;
  border-radius: 10px;
}

input {
  padding: 8px;
  width: 200px;
}
</style>

</head>
<body>

<h2>🎟️ Sistema de Rifa</h2>

<button onclick="abrir()">Comprar boletos</button>

<div id="popup">
  <div id="popupContenido">
    <h3>Datos del cliente</h3>

    <input id="nombre" placeholder="Nombre"><br><br>
    <input id="numero" placeholder="Número inicial"><br><br>
    <input id="cantidad" placeholder="Cantidad de boletos"><br><br>

    <button onclick="enviar()">Guardar</button>
    <button onclick="cerrar()">Cerrar</button>
  </div>
</div>

<script>
function abrir(){
  document.getElementById("popup").style.display = "flex";
}

function cerrar(){
  document.getElementById("popup").style.display = "none";
}

function enviar(){

  let nombre = document.getElementById("nombre").value;
  let numero = document.getElementById("numero").value;
  let cantidad = document.getElementById("cantidad").value;

  if(nombre === "" || numero === "" || cantidad === ""){
    alert("⚠️ Completa todos los campos");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbydRD9DyHKAbXbJsQMdnpre4KFyKm9ugxyR5az6qtP7nxueuc3SR6tdj3AKypjdV5pI/exec", {
    method: "POST",
    body: JSON.stringify({
      nombre: nombre,
      numero: numero,
      cantidad: cantidad
    })
  })
  .then(res => res.text())
  .then(data => {
    alert(data);

    document.getElementById("nombre").value = "";
    document.getElementById("numero").value = "";
    document.getElementById("cantidad").value = "";

    cerrar();
  })
  .catch(err => {
  alert("❌ Error real: " + err);
});
}
</script>

</body>
</html>
